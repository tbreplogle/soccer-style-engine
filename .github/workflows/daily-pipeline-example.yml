name: Daily Pipeline Example

on:
  workflow_dispatch:

jobs:
  daily-pipeline-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Health check
        run: python -m src.cli operational-health-check
      - name: Run tests
        run: python -m pytest tests/test_phase15_operational.py tests/test_phase16_automation.py
      - name: Example local-only daily pipeline
        run: |
          echo "This workflow is an example. It does not commit generated outputs."
          mkdir -p data/raw/football-data
          cat > data/raw/football-data/E0_2526.csv <<'CSV'
          Date,HomeTeam,AwayTeam,FTHG,FTAG,FTR,HS,AS,HST,AST,HC,AC,B365H,B365D,B365A
          01/02/26,Red FC,Blue FC,1,0,H,10,8,4,3,5,4,2.0,3.2,3.6
          02/02/26,Green FC,Yellow FC,2,1,H,12,7,5,2,6,3,2.1,3.1,3.4
          03/02/26,Blue FC,Green FC,0,0,D,8,8,2,2,4,4,2.2,3.0,3.2
          CSV
          python -m src.cli run-daily-pipeline --as-of-date 2026-02-20 --season-code 2526 --leagues E0 --processed-output data/processed/github_actions_example.csv --output-root outputs/runs --slate-type historical --max-matches 1 --skip-download --currentness-policy warn
